name: Deployment
on:
  push:
    branches:
      - main
      - dev
env:
  MONGODB_DB_NAME: gh-actions-db
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: fobidike.wcfbgom.mongodb.net
      MONGODB_USERNAME: frankobidike20_db_user
      MONGODB_PASSWORD: hkxw6JOni0PHArx8
      PORT: 8080
    environment: testing
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: | 
          echo "envs: ${{env.MONGODB_CLUSTER_ADDRESS}}"
          npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME}}"
          echo "env: ${{ env}}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "..."
